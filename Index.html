<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Elixir - Cyberpunk Edition</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2933/2933245.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================= */
        /* 1. VARIÁVEIS E RESET                                      */
        /* ========================================================= */
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00e5;
            --neon-purple: #b000ff;
            --cyber-dark: #0a0a12;
            --glass-bg: rgba(13, 13, 26, 0.65);
            --glass-border: rgba(0, 240, 255, 0.12);
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
            --text-primary: #e0e8ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cyber-dark);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.stop-scroll { overflow: hidden; }

        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }
        @keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(50px); } }

        /* ========================================================= */
        /* 2. HEADER E BUSCA                                         */
        /* ========================================================= */
        header {
            position: sticky; top: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            font-family: var(--font-tech);
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-size: 24px;
        }

        .search-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ========================================================= */
        /* 3. GRID E CARDS                                           */
        /* ========================================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            display: flex; flex-direction: column;
        }

        .glass-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .glass-card::after {
            content: "";
            position: absolute;
            top: -100%; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                transparent 0%, 
                rgba(0, 240, 255, 0.2) 45%, 
                var(--neon-cyan) 50%, 
                rgba(0, 240, 255, 0.2) 55%, 
                transparent 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }
        .glass-card:hover::after { animation: scanLine 2s linear infinite; opacity: 0.4; }
        @keyframes scanLine { 0% { top: -100%; } 100% { top: 100%; } }

        .card-image {
            width: 100%; aspect-ratio: 1; object-fit: cover;
            border-radius: 12px; margin-bottom: 12px;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        .notes-tag {
            font-size: 10px;
            font-family: var(--font-tech);
            color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.05);
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            border-left: 2px solid var(--neon-cyan);
            text-transform: uppercase;
            line-height: 1.4;
        }

        /* ========================================================= */
        /* 4. COMPONENTES DE UI                                      */
        /* ========================================================= */
        .price-table {
            background: rgba(0, 0, 0, 0.4); border-radius: 8px;
            padding: 8px; margin-bottom: 12px; border: 1px solid var(--glass-border);
        }

        .price-row {
            display: flex; justify-content: space-between; font-size: 11px;
            padding: 3px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: var(--font-tech);
        }

        .price-value, #totalDisplay {
            color: var(--neon-cyan);
            font-family: var(--font-tech);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .cyber-input {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            padding: 12px;
            color: var(--neon-cyan);
            outline: none;
            width: 100%;
            transition: 0.3s;
            font-family: var(--font-tech);
            font-size: 0.85rem;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
        }
        .cyber-input:focus { 
            border-color: var(--neon-magenta); 
            box-shadow: 0 0 15px rgba(255, 0, 229, 0.3); 
        }

        .neon-btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px; border-radius: 8px;
            font-family: var(--font-tech);
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.75rem; font-weight: bold;
            width: 100%; z-index: 5;
        }
        .neon-btn:hover { background: var(--neon-cyan); color: var(--cyber-dark); box-shadow: 0 0 20px var(--neon-cyan); }

        /* ========================================================= */
        /* 5. CARRINHO LATERAL E EFEITO LASER                        */
        /* ========================================================= */
        .cart-sidebar {
            position: fixed; right: -100%; top: 0;
            width: 100%; max-width: 400px; height: 100%;
            background: rgba(10, 10, 18, 0.95); 
            backdrop-filter: blur(25px);
            border-left: 1px solid var(--neon-cyan);
            box-shadow: -15px 0 35px rgba(0, 0, 0, 0.5);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 25px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .cart-sidebar.active { right: 0; }

        /* LINHA DE LASER DISCRETA */
        .scanner-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px 2px var(--neon-cyan);
            z-index: 1010;
            pointer-events: none;
            opacity: 0;
        }

        /* FUNDO COM DADOS BINÁRIOS DISCRETOS */
        .scan-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.02));
            pointer-events: none;
            z-index: 1009;
            opacity: 0;
            transition: 0.3s;
            display: flex; flex-direction: column;
            justify-content: flex-end; padding: 10px;
        }

        .scan-data-stream {
            color: rgba(0, 240, 255, 0.15); font-family: var(--font-tech);
            font-size: 7px; word-break: break-all; width: 100%; line-height: 1;
        }

        /* ATIVAÇÃO DO LASER NO HOVER */
        .cart-sidebar:hover .scanner-line {
            opacity: 0.8;
            animation: laserScan 4s ease-in-out infinite;
        }
        .cart-sidebar:hover .scan-overlay {
            opacity: 1;
        }

        @keyframes laserScan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }

        .cart-item {
            padding: 15px; 
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(5px);
            border-radius: 2px; 
            border-left: 4px solid var(--neon-cyan);
            margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-tech); font-size: 0.8rem;
            position: relative; z-index: 5;
        }

        .checkout-form {
            background: rgba(20, 20, 35, 0.8) !important;
            backdrop-filter: blur(15px);
            padding: 20px !important; 
            border-radius: 4px; 
            border: 2px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 5;
        }

        .cart-btn-header {
            background: rgba(0, 240, 255, 0.1); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); border-radius: 50px; padding: 8px 18px;
            display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
            font-family: var(--font-tech); font-weight: bold;
        }

        .frete-alerta {

            border-radius: 6px; border: 1px solid var(--neon-magenta); font-size: 10px;
        }
        @keyframes alertPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

    function carregarBairros() {
        const select = document.getElementById('cust-bairro');
        TABELA_FRETES.forEach(f => {
            let opt = document.createElement('option');
            opt.value = f.bairro;
            opt.text = `${f.bairro.toUpperCase()} (R$ ${f.valor.toFixed(2)})`;
            select.add(opt);
        });
        let optOutra = document.createElement('option');
        optOutra.value = "OUTRA_CIDADE";
        optOutra.text = "FORA DE JOINVILLE (ENVIO)";
        select.add(optOutra);
    }

    function renderizarProdutos() {
        const container = document.getElementById('gridContainer');
        container.innerHTML = PERFUMES.map(p => `
            <div class="glass-card">
                <img src="${p.img}" class="card-image">
                <div style="font-size:9px; color:var(--neon-magenta); font-family:var(--font-tech); margin-bottom:4px;">// ${p.brand}</div>
                <h3 style="margin-bottom: 10px; font-family:var(--font-tech); font-size:1rem">${p.name}</h3>
                
                <div class="notes-tag">
                    <span style="opacity:0.5">DNA:</span> ${p.notes || 'Notas não informadas'}
                </div>

                <div class="price-table">
                    ${p.somenteLacrado ? '' : `
                        <div class="price-row"><span>Decant 10ml</span><span class="price-value">R$ ${PRECOS_FIXOS.decant10ml}</span></div>
                        <div class="price-row"><span>Decant 30ml</span><span class="price-value">R$ ${PRECOS_FIXOS.decant30ml}</span></div>
                    `}
                    <div class="price-row"><span>Lacrado</span><span class="price-value">R$ ${p.priceLacrado}</span></div>
                </div>
                
                <div style="flex-grow: 1;"></div>
                
                <select class="cyber-input" id="select-${p.id}" style="padding: 8px; font-size: 0.7rem;">
                    ${p.somenteLacrado ? '' : `
                        <option value="10ml">10ml - R$ ${PRECOS_FIXOS.decant10ml}</option>
                        <option value="30ml">30ml - R$ ${PRECOS_FIXOS.decant30ml}</option>
                    `}
                    <option value="Lacrado">Lacrado - R$ ${p.priceLacrado}</option>
                </select>
                <button class="neon-btn" onclick="adicionarAoCarrinho(${p.id})">ADICIONAR</button>
            </div>
        `).join('');
    }

    function filtrarProdutos() {
        const termo = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(termo) ? "flex" : "none";
        });
    }

    function adicionarAoCarrinho(id) {
        const perfume = PERFUMES.find(p => p.id === id);
        const tamanho = document.getElementById(`select-${id}`).value;
        let valor = (tamanho === "10ml") ? PRECOS_FIXOS.decant10ml : (tamanho === "30ml" ? PRECOS_FIXOS.decant30ml : perfume.priceLacrado);
        carrinho.push({ nome: perfume.name, tamanho: tamanho, preco: valor });
        atualizarCarrinho();
        const cart = document.getElementById('cartSidebar');
        if(!cart.classList.contains('active')) toggleCart();
    }

    function atualizarCarrinho() {
        document.getElementById('cartCount').innerText = carrinho.length;
        const itensDiv = document.getElementById('cartItems');
        let subtotal = 0;
        
        itensDiv.innerHTML = carrinho.map((item, index) => {
            subtotal += item.preco;
            return `<div class="cart-item">
                <div><strong>${item.nome}</strong><br><small style="color:var(--neon-cyan)">${item.tamanho}</small></div>
                <div style="display:flex; align-items:center;"><span class="price-value">R$ ${item.preco.toFixed(2)}</span> 
                <i class="material-icons" onclick="removerItem(${index})" style="font-size:18px; color:var(--neon-magenta); cursor:pointer; margin-left:10px;">delete</i></div>
            </div>`;
        }).join('');

        const bairro = document.getElementById('cust-bairro').value;
        let frete = 0;
        if (bairro === "OUTRA_CIDADE") {
            document.getElementById('freteDisplay').innerHTML = `FRETE: <span class="frete-alerta">A COMBINAR</span>`;
        } else {
            const objFrete = TABELA_FRETES.find(f => f.bairro === bairro);
            frete = objFrete ? objFrete.valor : 0;
            document.getElementById('freteDisplay').innerText = `FRETE: R$ ${frete.toFixed(2)}`;
        }

        const vipInput = document.getElementById('vipCode').value;
        let total = subtotal + frete;
        let desconto = 0;
        
        if (btoa(vipInput) === VIP_HASH) {
            desconto = total * 0.07;
            total = total - desconto;
            document.getElementById('discountDisplay').style.display = 'block';
            document.getElementById('discountDisplay').innerText = `DESCONTO VIP (7%): - R$ ${desconto.toFixed(2)}`;
        } else {
            document.getElementById('discountDisplay').style.display = 'none';
        }

        document.getElementById('subtotalDisplay').innerText = `PRODUTOS: R$ ${subtotal.toFixed(2)}`;
        document.getElementById('totalDisplay').innerText = `TOTAL: R$ ${total.toFixed(2)}`;
    }

    function removerItem(index) { carrinho.splice(index, 1); atualizarCarrinho(); }
    function toggleCart() { 
        const cart = document.getElementById('cartSidebar');
        cart.classList.toggle('active');
        document.body.classList.toggle('stop-scroll', cart.classList.contains('active'));
    }

    function verificarLocalidade() {
        document.getElementById('campo-outra-cidade').style.display = (document.getElementById('cust-bairro').value === "OUTRA_CIDADE") ? "block" : "none";
        atualizarCarrinho();
    }

    function checkoutWhatsApp() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        const nome = document.getElementById('cust-nome').value.trim();
        const rua = document.getElementById('cust-rua').value.trim();
        const bairro = document.getElementById('cust-bairro').value;
        if(!nome || !rua || !bairro) return alert("Preencha os dados de entrega!");

        let msg = "*NOVO PEDIDO - ZION ELIXIR*\n\n";
        msg += "*CLIENTE:* " + nome + "\n";
        msg += "*END:* " + rua + " [" + bairro + "]\n";
        if (btoa(document.getElementById('vipCode').value) === VIP_HASH) msg += "*STATUS:* CLIENTE ELITE (VIP)\n";
        msg += "\n";
        carrinho.forEach(i => msg += "• " + i.nome + " (" + i.tamanho + ") - R$ " + i.preco.toFixed(2) + "\n");
        msg += "\n*TOTAL: " + document.getElementById('totalDisplay').innerText + "*";
        window.open("https://wa.me/5547988997312?text=" + encodeURIComponent(msg));
    }

    document.getElementById('cartBtn').onclick = toggleCart;
    carregarBairros();
    renderizarProdutos();
</script>
</body>
</html>
