    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        /* ========================================================= */
        /* 1. VARIÁVEIS GLOBAIS - Cyber-Glass Design System          */
        /* ========================================================= */
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00e5;
            --neon-purple: #b000ff;
            --cyber-dark: #0a0a12;
            --glass-bg: rgba(13, 13, 26, 0.65);
            --glass-border: rgba(0, 240, 255, 0.12);
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
            --text-primary: #e0e8ff;
        }

        /* ========================================================= */
        /* 2. RESET E FUNDO DINÂMICO                                 */
        /* ========================================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cyber-dark);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efeito de Grade ao Fundo */
        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: translateY(0); }
            to { transform: translateY(50px); }
        }

        /* ========================================================= */
        /* 3. ESTRUTURA DA LOJA (Adaptado ao Design System)          */
        /* ========================================================= */

        header {
            position: sticky; top: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            font-family: var(--font-tech);
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-size: 24px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* ========================================================= */
        /* 4. COMPONENTES DO DESIGN SYSTEM (Cyber-Glass)             */
        /* ========================================================= */

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
            display: flex; flex-direction: column;
        }

        .glass-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 15px; height: 15px;
            border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan);
            border-radius: 4px 0 0 0;
        }

        .card-image {
            width: 100%; aspect-ratio: 1; object-fit: cover;
            border-radius: 12px; margin-bottom: 15px;
            border: 1px solid rgba(0, 240, 255, 0.05);
        }

        .price-table {
            background: rgba(0, 0, 0, 0.4); border-radius: 8px;
            padding: 10px; margin-bottom: 15px; border: 1px solid var(--glass-border);
        }

        .price-row {
            display: flex; justify-content: space-between; font-size: 12px;
            padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: var(--font-tech);
        }

        .price-value { color: var(--neon-cyan); font-weight: bold; }

        .cyber-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px; padding: 12px;
            color: var(--text-primary);
            outline: none; width: 100%; transition: 0.3s;
            font-family: var(--font-tech);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        
        select.cyber-input option {
            background: var(--cyber-dark);
            color: var(--text-primary);
        }

        .cyber-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .neon-btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 25px;
            border-radius: 8px;
            font-family: var(--font-tech);
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem; font-weight: bold;
            width: 100%;
        }

        .neon-btn:hover {
            background: var(--neon-cyan); color: var(--cyber-dark);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* ========================================================= */
        /* 5. ESTILOS DO CARRINHO LATERAL (Sidebar Cyber)            */
        /* ========================================================= */
        .cart-sidebar {
            position: fixed; right: -100%; top: 0;
            width: 100%; max-width: 400px; height: 100%;
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--neon-cyan);
            box-shadow: -10px 0 30px rgba(0, 240, 255, 0.1);
            transition: 0.4s ease-in-out;
            z-index: 1000; padding: 25px;
            display: flex; flex-direction: column; box-sizing: border-box;
            overflow-y: auto;
        }

        .cart-sidebar.active { right: 0; }

        .cart-item {
            padding: 15px 0; border-bottom: 1px dashed var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-tech); font-size: 0.85rem;
        }

        .checkout-form {
            background: var(--glass-bg); padding: 20px;
            border-radius: 12px; margin-top: 25px;
            border: 1px solid var(--glass-border);
        }

        .checkout-form h4 {
            margin: 0 0 15px 0; color: var(--neon-cyan);
            font-size: 14px; text-transform: uppercase; font-family: var(--font-tech);
        }

        .form-group { margin-bottom: 10px; }

        .form-group label {
            display: block; font-size: 11px; margin-bottom: 6px;
            color: rgba(255,255,255,0.6); font-family: var(--font-tech);
        }

        .coupon-area { margin: 20px 0; }
        .coupon-flex { display: flex; gap: 10px; }
        
        #couponMsg {
            font-size: 11px; margin-top: 10px; text-align: center;
            font-family: var(--font-tech); text-transform: uppercase;
        }

        #priceDetails {
            margin: 20px 0; background: rgba(0, 0, 0, 0.4);
            padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border);
            font-family: var(--font-tech);
        }

        .frete-alerta {
            animation: alertPulse 1.2s infinite ease-in-out; font-weight: bold;
            background: rgba(255, 0, 229, 0.1); padding: 4px 10px;
            border-radius: 6px; border: 1px solid var(--neon-magenta);
            display: inline-block; margin-left: 5px;
        }

        @keyframes alertPulse {
            0% { color: var(--neon-magenta); box-shadow: 0 0 5px var(--neon-magenta); }
            50% { color: #fff; box-shadow: 0 0 15px var(--neon-magenta); }
            100% { color: var(--neon-magenta); box-shadow: 0 0 5px var(--neon-magenta); }
        }
        
        .cart-btn-header {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
            font-family: var(--font-tech); font-weight: bold;
        }
        
        .cart-btn-header:hover { background: var(--neon-cyan); color: var(--cyber-dark); }

        /* ========================================================= */
        /* 6. RESPONSIVIDADE (Mobile Fix)                            */
        /* ========================================================= */
        @media screen and (max-width: 768px) {
            .cart-sidebar {
                width: 100% !important;
                max-width: 100% !important;
                padding: 15px !important;
                right: -100%;
            }
            .cart-sidebar.active { right: 0; }

            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* 2 itens por linha no celular */
                gap: 10px;
                padding: 10px;
            }

            .glass-card { padding: 1rem; }
            .logo { font-size: 18px; }

            #cartItems {
                max-height: 40vh; /* Aumenta a visibilidade dos itens no celular */
                overflow-y: auto;
            }

            .neon-btn {
                padding: 10px 15px;
                font-size: 0.75rem;
            }
        }

        @media screen and (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr; /* 1 item por linha em telas muito pequenas */
            }
        }
    </style>
</head>

                    <img src="${p.img}" class="card-image">
                    <div style="font-size:10px; color:rgba(255,255,255,0.5); font-family:var(--font-tech)">// ${p.brand} - ID: ${p.id}</div>
                    <h3 style="margin: 5px 0; font-family:var(--font-tech); font-size:1.1rem">${p.name}</h3>
                    
                    <div class="price-table">
                        ${p.somenteLacrado ? '' : `
                            <div class="price-row"><span>Decant 10ml</span><span class="price-value">R$ ${PRECOS_FIXOS.decant10ml}</span></div>
                            <div class="price-row"><span>Decant 30ml</span><span class="price-value">R$ ${PRECOS_FIXOS.decant30ml}</span></div>
                        `}
                        <div class="price-row"><span>Lacrado</span><span class="price-value">R$ ${p.priceLacrado}</span></div>
                    </div>
                    
                    <div style="flex-grow: 1;"></div>
                    
                    <select class="cyber-input" id="select-${p.id}">
                        ${p.somenteLacrado ? '' : `
                            <option value="10ml">Decant 10ml - R$ ${PRECOS_FIXOS.decant10ml}</option>
                            <option value="30ml">Decant 30ml - R$ ${PRECOS_FIXOS.decant30ml}</option>
                        `}
                        <option value="Lacrado">Lacrado - R$ ${p.priceLacrado}</option>
                    </select>
                    <button class="neon-btn" onclick="adicionarAoCarrinho(${p.id})">ADICIONAR</button>
                </div>
            `).join('');
        }

        function adicionarAoCarrinho(id) {
            const perfume = PERFUMES.find(p => p.id === id);
            const tamanho = document.getElementById(`select-${id}`).value;
            let valor = (tamanho === "10ml") ? PRECOS_FIXOS.decant10ml : (tamanho === "30ml" ? PRECOS_FIXOS.decant30ml : perfume.priceLacrado);
            carrinho.push({ nome: perfume.name, tamanho: tamanho, preco: valor });
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            document.getElementById('cartCount').innerText = carrinho.length;
            const itensDiv = document.getElementById('cartItems');
            const freteDiv = document.getElementById('freteDisplay');
            let subtotal = 0;
            
            itensDiv.innerHTML = carrinho.map((item, index) => {
                subtotal += item.preco;
                return `<div class="cart-item">
                    <div><strong style="color:white;">${item.nome}</strong><br><small style="color:var(--neon-cyan)">[ ${item.tamanho} ]</small></div>
                    <div>R$ ${item.preco.toFixed(2)} <i class="material-icons" onclick="removerItem(${index})" style="font-size:18px; color:var(--neon-magenta); cursor:pointer; margin-left:15px; vertical-align:middle; transition:0.3s;">delete</i></div>
                </div>`;
            }).join('');

            const bairroSelecionado = document.getElementById('cust-bairro').value;
            let valorFrete = 0;

            if (bairroSelecionado === "OUTRA_CIDADE") {
                valorFrete = 0;
                freteDiv.innerHTML = `Frete: <span class="frete-alerta">⚠️ A COMBINAR</span>`;
                freteDiv.style.color = "var(--neon-magenta)";
            } else if (bairroSelecionado !== "") {
                const freteObj = TABELA_FRETES.find(f => f.bairro === bairroSelecionado);
                valorFrete = freteObj ? freteObj.valor : 0;
                freteDiv.innerText = `Frete: R$ ${valorFrete.toFixed(2)}`;
                freteDiv.style.color = "var(--neon-cyan)";
            } else {
                freteDiv.innerText = `Frete: R$ 0,00`;
                freteDiv.style.color = "var(--neon-cyan)";
            }

            let desconto = cupomAtivo ? subtotal * 0.10 : 0;
            let total = subtotal + valorFrete - desconto;

            document.getElementById('subtotalDisplay').innerText = `Produtos: R$ ${subtotal.toFixed(2)}`;
            
            if(cupomAtivo) {
                document.getElementById('discountDisplay').style.display = 'block';
                document.getElementById('discountDisplay').innerText = `Desconto VIP (10%): -R$ ${desconto.toFixed(2)}`;
            } else { 
                document.getElementById('discountDisplay').style.display = 'none'; 
            }
            
            document.getElementById('totalDisplay').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        function aplicarCupom() {
            const input = document.getElementById('couponInput');
            const codigo = input.value.trim().toLowerCase();
            const msg = document.getElementById('couponMsg');
            if(codigo === "elite10") {
                cupomAtivo = true;
                msg.innerText = "// ACESSO VIP LIBERADO 🎉"; msg.style.color = "#00FF00";
            } else {
                cupomAtivo = false;
                msg.innerText = "ERRO: CÓDIGO INVÁLIDO."; msg.style.color = "var(--neon-magenta)";
            }
            input.value = "";
            atualizarCarrinho();
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarCarrinho();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        function checkoutWhatsApp() {
            if(carrinho.length === 0) return alert("Carrinho vazio!");

            const nome = document.getElementById('cust-nome').value.trim();
            const rua = document.getElementById('cust-rua').value.trim();
            const bairro = document.getElementById('cust-bairro').value;
            const cidadeOutra = document.getElementById('cust-cidade').value.trim();

            if(!nome || !rua || !bairro) return alert("Por favor, preencha os dados de entrega!");
            if(bairro === "OUTRA_CIDADE" && !cidadeOutra) return alert("Informe sua Cidade e CEP!");

            let valorFreteTexto = "";
            let localizacaoTexto = "";
            let valorFreteNum = 0;

            if (bairro === "OUTRA_CIDADE") {
                valorFreteTexto = "⚠️ A COMBINAR (ENVIO)";
                localizacaoTexto = `🌍 Cidade/CEP: ${cidadeOutra}`;
                valorFreteNum = 0;
            } else {
                const freteObj = TABELA_FRETES.find(f => f.bairro === bairro);
                valorFreteNum = freteObj ? freteObj.valor : 0;
                valorFreteTexto = `R$ ${valorFreteNum.toFixed(2)}`;
                localizacaoTexto = `🏘️ Bairro: ${bairro}`;
            }

            let subtotal = carrinho.reduce((a, b) => a + b.preco, 0);
            let desconto = cupomAtivo ? subtotal * 0.1 : 0;
            let total = subtotal + valorFreteNum - desconto;
            
            let texto = "*NOVO PEDIDO - ZION ELIXIR*\n\n";
            texto += "*ENTREGA:*\n";
            texto += "\uD83D\uDC64 Cliente: " + nome + "\n";
            texto += "\uD83D\uDCCD End: " + rua + "\n";
            texto += localizacaoTexto + "\n\n";
            
            texto += "*PRODUTOS:*\n";
            carrinho.forEach(item => {
                texto += "\u2022 " + item.nome + " (" + item.tamanho + ") - R$ " + item.preco.toFixed(2) + "\n";
            });
            
            texto += "\n\uD83D\uDE9A Frete: " + valorFreteTexto;
            if(cupomAtivo) texto += "\n\uD83C\uDF81 Desconto VIP: -R$ " + desconto.toFixed(2);
            texto += "\n*TOTAL A PAGAR: R$ " + total.toFixed(2) + "*";
            
            window.open("https://wa.me/5547988997312?text=" + encodeURIComponent(texto));
        }

        document.getElementById('cartBtn').onclick = toggleCart;
        carregarBairros();
        renderizarProdutos();
    </script>
</body>
</html>
